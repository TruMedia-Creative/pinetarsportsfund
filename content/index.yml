about:
  headline: Meet the operator
  title: "Tim Truman brings
    deal discipline to sports capital."
  description: Pine Tar Sports Fund is built around operator judgment, structured underwriting, and long-term alignment. Tim Truman leads the platform with a focus on credible execution over promotional noise.
  primaryProfile:
    name: Tim Truman
    title: Founder & Managing Partner
    quote: "We structure sports and entertainment deals the same way institutional capital evaluates any serious opportunity: with discipline, alignment, and a clear path to value creation."
    body: Tim Truman brings together operating experience, relationship-driven deal access, and a practical understanding of how capital moves through sports and entertainment markets. His approach centers on sourcing opportunities where underwriting discipline, smart structuring, and long-term partnership matter more than hype. That philosophy shapes how Pine Tar Sports Fund evaluates risk, aligns stakeholders, and builds offerings investors can understand.
    imageUrl: /tim-headshot.jpg
    credibilityBullets:
      - Operator-led perspective rooted in how sports assets actually perform over time.
      - Structured capital approach designed for investors, lenders, sponsors, and municipalities.
      - Underwriting discipline centered on downside protection, execution quality, and alignment.
    timelineItems:
      - period: 2019
        label: Dugout Baseball in Kilgore, TX
        description: Started this journey founding Dugout Baseball, a baseball field project in East Texas. The experience revealed a gap in how sports projects are structured and financed — and the opportunity to build a better way.
      - period: 2023
        label: Exited Dugout Baseball, Launched Pine Tar Sports
        description: Pine Tar Sports is born out of the lessons learned building and exiting Dugout Baseball. It is a baseball tournament business that also serves as a proving ground for the sports capital platform we are building.
      - period: Today
        label: Launching New Locations & New Deals
        description: Pine Tar Sports Fund continues to expand its pipeline of sports and entertainment projects, while also launching new Dugout Baseball locations in partnership with local operators.
  profiles:
    - name: Larryon Truman, II
      title: Business Development & Investor Relations
      quote: "Play ball. Then keep score. Investors want to know how the game is going, and they want to trust the team keeping score."
      body: Larryon helps translate complex deal structures into materials investors can evaluate quickly and confidently. He focuses on clarity, reporting cadence, and maintaining trust through disciplined communication from first review through closing.
      credibilityBullets:
        - Investor-facing process built around clarity, responsiveness, and documentation quality.
        - Keeps offering materials aligned with diligence expectations and stakeholder questions.
        - Extends the firm’s emphasis on transparency beyond fundraising into ongoing communication.
      timelineItems:
        - period: Positioning
          label: Materials discipline
          description: Helped shape a tighter process for turning live opportunities into coherent investor-ready narratives.
        - period: Execution
          label: Stakeholder coordination
          description: Supports communication across investors, lenders, and operating partners as deals advance.
        - period: Ongoing
          label: Reporting focus
          description: Maintains a clear expectation that updates, documentation, and accountability remain part of the investment experience.
    - name: Marcus Vale
      title: Strategic Partnerships
      quote: "The best sports deals work because the capital stack and the operating partners are aligned before the market ever sees the offering."
      body: Marcus supports partner strategy across sponsors, municipalities, and operating counterparties. His role centers on shaping opportunities so commercial alignment, execution reality, and capital needs fit together before a project is presented to investors.
      credibilityBullets:
        - Partnership-first mindset across public, private, and sponsor-backed deal structures.
        - Focuses on aligning operating incentives before capital formation accelerates.
        - Reinforces execution quality by surfacing partner-fit issues early in the process.
      timelineItems:
        - period: Sourcing
          label: Relationship mapping
          description: Built a working network around sports-adjacent projects where partner quality matters as much as headline economics.
        - period: Structuring
          label: Alignment review
          description: Helps pressure-test whether counterparties, sponsors, and project economics support a durable transaction.
        - period: Pipeline
          label: Opportunity development
          description: Continues expanding the fund’s access to projects that benefit from disciplined partnership architecture.
features:
  headline: Why Pine Tar
  title: "Structured deals.\nSerious returns."
  description: We identify, underwrite, and manage sports capital projects — so investors gain institutional-grade exposure to a high-growth, relationship-driven market.
  items:
    - icon: i-lucide-shield-check
      title: Institutional Underwriting
      description: Every deal is stress-tested against conservative, base, and upside scenarios before it reaches an investor desk.
    - icon: i-lucide-trophy
      title: Sports & Entertainment Focus
      description: Venues, naming rights, media deals, franchise equity, and stadium financing — asset classes with durable long-term demand.
    - icon: i-lucide-users
      title: Operator-Led Structure
      description: Principals have direct operating experience in professional sports, which means our diligence is practitioner-grade, not advisory.
    - icon: i-lucide-landmark
      title: Multi-Source Capital
      description: We work with equity investors, lenders, sponsors, and municipalities — structuring each deal to match the right capital to the right risk profile.
    - icon: i-lucide-file-text
      title: Transparent Decks
      description: Every active offering has a dedicated investor deck published here — terms, projections, use of funds, and team, all in one place.
    - icon: i-lucide-handshake
      title: Partnership Alignment
      description: Our fee structure is back-end heavy. We win when our investors win. There is no incentive to over-raise or over-promise.
metrics:
  headline: By the numbers
  title: "A track record built on execution."
