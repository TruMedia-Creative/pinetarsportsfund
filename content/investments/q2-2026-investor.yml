investmentThesis:
  enabled: true
  body: |
    Sports and entertainment real estate sits at the intersection of institutional-grade infrastructure and high-demand community assets. Unlike pure commercial real estate, multi-use sports complexes derive income from multiple synergistic streams: events, leases, naming rights, concessions, and youth programming.

    Riverside Sports Complex is positioned to become the dominant year-round sports and entertainment destination in the Kansas City metro — a 2.3M-person market currently underserved in modern indoor arena capacity.
  bullets:
    - "Proven Phase I revenue: $3.2M in Year 1 from amphitheater and athletic operations"
    - "Anchor tenant LOI signed: Regional AAA hockey franchise committed to 10-year lease"
    - "Municipal support: City of Kansas City has approved $4M in TIF financing for Phase II infrastructure"
    - "Scarcity value: No comparable multi-use indoor sports facility within 90 miles"
    - "Experienced operator: Development team has delivered 4 comparable assets since 2015"
    - ""
market:
  enabled: true
  body: |
    The Kansas City metro is the 31st largest DMA in the US, with a sports culture ranked among the most passionate in the country (back-to-back Super Bowl champions, World Series winners). Indoor sports facilities in the market are aging, with the primary arena (capacity 19,000) focused exclusively on top-tier professional events — creating a gap for mid-tier and youth/amateur programming.
  metrics:
    - value: 2.3M
      label: Metro population
    - value: $84K
      label: Median HHI
    - value: "0"
      label: Competing mid-tier indoor arenas
    - value: $1.1B
      label: Sports tourism spend (2025)
opportunity:
  enabled: true
  body: |
    Phase I delivered ahead of schedule and met revenue projections in its first operating year. Phase II construction begins Q3 2026 with a targeted grand opening of Q1 2028.

    The window to participate in preferred equity is limited to this raise cycle. Once construction milestones are met, capital structure will shift to senior debt refinancing.
  bullets:
    - Phase I operational and cash-flow positive as of January 2026
    - $4M TIF commitment from Kansas City reduces effective equity need
    - Anchor tenant (hockey franchise) provides base load revenue certainty
    - 10-year naming rights process underway with 2 regional brands in advanced discussions
  imageUrl: ""
projectName: Riverside Sports Complex
projectOverview:
  enabled: true
  body: |
    Riverside Sports Complex Phase II consists of:

    **8,500-seat indoor multi-use arena** — Designed for hockey, basketball, concerts, and trade shows. HVAC-equipped for year-round use. Full broadcast infrastructure included.

    **Expanded retail and hospitality district** — 12 food & beverage concepts, 3 private event spaces, and a 220-room adjacent hotel (hotel financed separately, under LOI with regional operator).

    **Youth sports hub expansion** — Additional 6 indoor courts and 2 turf fields increasing programming capacity by 40%.
  images: []
