investmentThesis:
  enabled: true
  body: |
    Sports and entertainment real estate sits at the intersection of institutional-grade infrastructure and high-demand community assets. Unlike pure commercial real estate, multi-use sports complexes derive income from multiple synergistic streams: events, leases, naming rights, concessions, and youth programming.

    Dugout Howe Complex is positioned to become the dominant year-round sports and entertainment destination in the North Texas market currently underserved in modern arena capacity.
  bullets:
    - "Proven Phase I revenue: $300K in Year 1 from athletic operations"
    - "Anchor tenant LOI signed: Committed to 10-year lease"
    - "Scarcity value: No comparable sports facility within 90 miles"
    - "Experienced operator: Development team has delivered 6 comparable assets since 2015"
  sectionImage:
    url: /howeproperty2.webp
    layout: banner-top
