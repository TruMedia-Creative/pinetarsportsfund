executiveSummary:
  enabled: true
  body: |
    Pine Tar Sports Fund is raising $18M in preferred equity to complete Phase II of the Riverside Sports Complex — a 42-acre multi-use sports and entertainment campus in Kansas City, Missouri.

    Phase I (youth athletic fields and a 4,000-seat amphitheater) is operational and generating revenue. This raise funds the 8,500-seat indoor arena and expanded retail/hospitality district, unlocking the bulk of long-term enterprise value.
