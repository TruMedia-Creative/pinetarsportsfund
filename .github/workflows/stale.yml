name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been inactive for 30 days and will be closed in 7 days unless there is activity."
          stale-pr-message: "This PR has been inactive for 14 days and will be closed in 7 days unless there is activity."
          close-issue-message: "Closing due to inactivity. Feel free to reopen if this is still relevant."
          close-pr-message: "Closing due to inactivity. Feel free to reopen if this is still relevant."
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,do-not-close"
