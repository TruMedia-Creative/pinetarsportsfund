seo:
  title: Pine Tar Sports Fund — Investment Opportunities in Sports & Entertainment
  description: Pine Tar Sports Fund connects investors, lenders, sponsors, and municipalities with premium sports and entertainment projects. Review our investment decks and explore partnership opportunities.
title: "Where Capital Meets\nThe Playing Field."
description: Pine Tar Sports Fund structures and manages investment opportunities across sports venues, teams, media rights, and entertainment projects — giving serious investors direct access to a market others overlook.
hero:
  headline: "Now accepting accredited investors"
  links:
    - label: View offering decks
      color: primary
      size: xl
      to: /decks
    - label: Learn about us
      size: xl
      color: neutral
      variant: soft
      to: /#about
terminal:
  lines:
    - segments:
        - text: "$ "
          style: prompt
        - text: "pinetarsf"
          style: cmd
        - text: " opportunities --status open"
          style: flag
    - segments:
        - text: "→ Scanning active offerings..."
          style: dim
    - segments:
        - text: "→ Found "
          style: dim
        - text: "3 open decks"
          style: cmd
        - text: " across "
          style: dim
        - text: "2 asset classes"
          style: cmd
    - segments:
        - text: "→ Minimum investment from "
          style: dim
        - text: "$250,000"
          style: metric-good
    - segments:
        - text: "→ Target IRR "
          style: dim
        - text: "18–24%"
          style: metric-good
    - segments:
        - text: " "
          style: dim
    - segments:
        - text: "✓ Investor portal at "
          style: success
        - text: "pinetarsportsfund.com/decks"
          style: url
logos:
  title: Structured for institutional and accredited investors
  items:
    - i-lucide-landmark
    - i-lucide-building-2
    - i-lucide-trophy
    - i-lucide-handshake
    - i-lucide-bar-chart-3
features:
  headline: Why Pine Tar
  title: "Structured deals.\nSerious returns."
  description: We identify, underwrite, and manage sports and entertainment capital projects — so investors gain institutional-grade exposure to a high-growth, relationship-driven market.
  items:
    - icon: i-lucide-shield-check
      title: Institutional Underwriting
      description: Every deal is stress-tested against conservative, base, and upside scenarios before it reaches an investor desk.
    - icon: i-lucide-trophy
      title: Sports & Entertainment Focus
      description: Venues, naming rights, media deals, franchise equity, and stadium financing — asset classes with durable long-term demand.
    - icon: i-lucide-users
      title: Operator-Led Structure
      description: Principals have direct operating experience in professional sports, which means our diligence is practitioner-grade, not advisory.
    - icon: i-lucide-landmark
      title: Multi-Source Capital
      description: We work with equity investors, lenders, sponsors, and municipalities — structuring each deal to match the right capital to the right risk profile.
    - icon: i-lucide-file-text
      title: Transparent Decks
      description: Every active offering has a dedicated investor deck published here — terms, projections, use of funds, and team, all in one place.
    - icon: i-lucide-handshake
      title: Partnership Alignment
      description: Our fee structure is back-end heavy. We win when our investors win. There is no incentive to over-raise or over-promise.
metrics:
  headline: By the numbers
  title: "A track record built on execution."
  description: Pine Tar Sports Fund has structured over $120M in sports and entertainment capital projects since inception.
  items:
    - value: "$120M+"
      label: Capital structured
      class: "text-primary"
    - value: "18–24%"
      label: Target IRR range
      class: "text-success"
    - value: "7"
      label: Active projects
      class: "text-info"
    - value: "$250K"
      label: Minimum investment
      class: "text-warning"
cta:
  title: "Ready to review\nan offering?"
  description: All active investment decks are available to accredited investors. Browse current opportunities or reach out directly to discuss fit.
  command: pinetarsportsfund.com/decks
  links:
    - label: Browse decks
      color: primary
      to: /decks
