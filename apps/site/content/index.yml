marketDemand:
  title: Why the Market Demand Is Real
  description: >
    Across many regions, demand for quality sports facilities continues to outpace supply. Families, athletes, leagues, and event organizers are all looking for well-run venues that offer more than just playable space.
  items:
    - title: Growing Sports Participation
      description: Youth and amateur sports continue to drive demand for facilities that can support leagues, practices, tournaments, and multi-day events.
      icon: i-lucide-trending-up
    - title: Limited High-Quality Inventory
      description: Many markets still lack modern, purpose-built complexes that can reliably serve teams, families, and event operators at a high level.
      icon: i-lucide-map-pinned
    - title: Destination-Based Demand
      description: Well-positioned sports venues can attract recurring traffic through tournaments, camps, travel teams, and community programming.
      icon: i-lucide-flag
    - title: Operational Opportunity
      description: Strong facilities become more valuable when they are supported by clear systems, consistent scheduling, and capable leadership.
      icon: i-lucide-settings
team:
  title: Built by People Who Understand Execution
  description: >
    Great sports projects are not built on concept alone. They require operators, planners, and decision-makers who understand how vision translates into real-world execution.
  items:
    - title: Project Leadership
      description: Guides the overall vision, strategic direction, and long-term development of the initiative.
      icon: i-lucide-briefcase
    - title: Operations
      description: Focuses on how facilities, programming, scheduling, and day-to-day execution come together in a sustainable way.
      icon: i-lucide-cog
    - title: Development Partners
      description: Supports planning, buildout, and implementation across the physical and operational components of the project.
      icon: i-lucide-hammer
    - title: Advisors and Stakeholders
      description: Contributes experience, relationships, and perspective to help shape a durable and credible sports platform.
      icon: i-lucide-users
faq:
  title: Frequently Asked Questions
  items:
    - label: What is Pine Tar Sports Fund?
      icon: i-lucide-circle-help
      content: Pine Tar Sports Fund is a sports-focused development and operations platform centered on building high-quality athletic destinations with long-term value and regional impact.
    - label: Is this only about baseball?
      icon: i-lucide-circle-help
      content: Baseball may be a major part of the vision, but the broader focus is on sports facilities, programming, and experiences that create sustained value for athletes, families, and communities.
    - label: What makes this different from a typical sports complex?
      icon: i-lucide-circle-help
      content: The goal is not simply to build fields. It is to create a well-operated destination with strong programming, thoughtful planning, and long-term strategic value.
    - label: Who is this for?
      icon: i-lucide-circle-help
      content: Pine Tar Sports Fund is relevant to community stakeholders, families, partners, operators, and others interested in the future of high-quality sports infrastructure.
    - label: How can I learn more or get involved?
      icon: i-lucide-circle-help
      content: The best next step is to reach out directly through the contact page to start the conversation.
cta:
  title: "Let's Build Something\nThat Lasts"
  description: >
    Pine Tar Sports Fund is about more than fields, facilities, or events alone. It is about creating sports destinations that are built to serve communities, support athletes, and grow in value over time.
  links:
