opportunity:
  enabled: true
  body: |
    The Riverside Sports Complex sponsorship opportunity is a rare chance to establish a brand at the ground floor of a new, purpose-built venue before opening day — when naming rights and foundational partnerships carry maximum long-term value.

    Corporate partners who commit during pre-opening receive naming recognition built into the physical and digital infrastructure from day one: signage, broadcast, digital, and programming.
  bullets:
    - "Naming rights partnership available — full venue naming opportunity"
    - "Category exclusivity: lock out competitors in your vertical for 10 years"
    - "Pre-opening pricing: foundational partners receive preferential naming rates vs. post-opening market"
    - "Revenue-linked packages available: align sponsorship cost to verified attendance milestones"
    - "Anchor tenant (regional Hockey franchise) delivers built-in media coverage from Season 1"
