projectOverview:
  enabled: true
  body: |
    **Indoor Arena (8,500 seats)** — Hockey, basketball, concerts, motorsport previews, trade shows, and community events. Full broadcast infrastructure, 360° LED fascia, and 28 premium suite boxes.

    **Retail and Hospitality District** — 12 food & beverage concepts, 3 private event spaces (capacity 50–500), and street-level retail in a walkable campus environment.

    **Youth Sports Hub** — 6 indoor courts and 8 turf fields serving 40+ youth sports leagues with 15,000+ participants. Tremendous family-audience brand touchpoints.
