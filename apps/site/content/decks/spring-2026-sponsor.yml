  body: |
    Riverside Sports Complex is Kansas City's next premier sports and entertainment destination. Opening Q1 2028, the 8,500-seat indoor arena and multi-use campus will host 120+ events per year — attracting an estimated 800,000+ annual visitors from across the metro and region.

    We are actively partnering with corporate sponsors who want meaningful, measurable brand presence with a sports-passionate, high-income audience.
